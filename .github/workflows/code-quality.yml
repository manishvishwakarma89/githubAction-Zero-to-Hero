# Linter and SAST Scan
# lint- flake8 & SAST- bandit 
name: Code Quality

on:
    workflow_call:

jobs:
    validate:
        runs-on: ubuntu-latest

        strategy:
              fail-fast: false
              matrix:
                  python-vesion: ["3.9","3.10","3.11","3.12","3.13"]
        steps:
          - name: checkout Code
            uses: actions/checkout@v4

          - name: set up python ${{matrix.python-vesion}}
            uses: actions/setup-python@v5
            with:
              python-version: ${{matrix.python-vesion}}

          - name: instll dependencies
            run: pip install -r requirements.txt
        
          - name: run linter
            run: flake8 app.py
        
          - name: run SAST
            run: bandit -r app.py
            
        