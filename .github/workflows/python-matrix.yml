name: Python lint

on:
  push:
      branches: [main]
jobs:
    validate:
        runs-on: ubuntu-latest

        steps:
          - name: checkout Code
            uses: actions/checkout@v4

          - name: set up python
            uses: actions/setup-python@v5
            with:
              python-version: "3.13"

          - name: instll dependencies
            run: pip install -r requirements.txt
        
          - name: run linter
            run: flake8 app.py
        
        