name: DevSecOps End To End Pipeline

on: 
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # CI (Continuous Integration with Security Scanning)
  code-quality:
    uses: ./.github/workflows/code-quality.yml

  secrets-scan:
    uses: ./.github/workflows/secrets-scan.yml
    secrets: inherit
    
  dependency-scan:
    uses: ./.github/workflows/dependency-scan.yml
    
  docker-scan:
    uses: ./.github/workflows/docker-lint.yml

  tests:
    uses: ./.github/workflows/tests.yml

  # Build
  build:
    needs: [code-quality, tests]
    uses: ./.github/workflows/docker-build-push.yml
    secrets: inherit
    
  # Image scan 
  trivy:
    needs: [build]
    uses: ./.github/workflows/images-scan.yml
    secrets: inherit

  # CD : Deploy to Production 
  deploy:
    needs: [trivy]
    uses: ./.github/workflows/deploy-to-server.yml
    secrets: inherit
    environment:
      name: production
