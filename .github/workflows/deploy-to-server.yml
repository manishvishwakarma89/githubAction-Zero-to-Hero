# this will deploy the safe secured/tested app to Prod Server
name: Deploy to Prod Server

on:
    workflow_call:

jobs:
    deploy:
        runs-on: ubuntu-latest

        steps:
            - name: SSH to Server
              uses: appleboy/ssh-action@v1
              with:
                host: ${{ secrets.EC2_SSH_HOST }}
